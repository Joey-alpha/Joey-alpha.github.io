<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Add</title>
    <link rel="stylesheet" href="css/quick-add.css" />
</head>
<body>
  <div class="card">
    <h1>Quick Add</h1>

    <textarea
      id="taskInput"
      class="input"
      placeholder="输入 item…"
      autocomplete="off"
    ></textarea>

    <div class="actions">
      <button id="addBtn" class="btn primary">添加到 Inbox</button>
      <button id="closeBtn" class="btn secondary">关闭</button>
    </div>

    <div id="message" class="message"></div>
  </div>
    <script src="js/empty-box-state.js"></script>
    <script src="js/empty-box-storage.js"></script>
    <script src="js/quick-add.js"></script>
</body>
</html>
