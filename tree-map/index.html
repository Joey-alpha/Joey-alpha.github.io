<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Learning Roadmap Tree</title>
    <link rel="stylesheet" href="css/tree-map.css" />
</head>

<body>
    <div id="app">
        <div class="status-strip">
            <div class="space-name" id="currentSpaceName"></div>
            <div class="status" id="statusText">No selection</div>
        </div>

        <div class="toolbar">
            <div class="group node-action-group">
                <button id="addRootBtn" title="Add Root" aria-label="Add Root" data-icon="+">Add Root</button>
            </div>
            <div class="group view-action-group">
                <button id="resetViewBtn" title="Reset View" aria-label="Reset View" data-icon="⟳">Reset View</button>
                <button id="settingsBtn" title="Settings" aria-label="Settings" data-icon="⚙">Settings</button>
            </div>
            <div class="group search-group collapsed" role="search">
                <button id="nodeSearchToggleBtn" class="search-toggle-btn" type="button" aria-label="Search nodes"
                    aria-expanded="false" data-icon="⌕">Search</button>
                <input id="nodeSearchInput" class="node-search-input" type="search" placeholder="Search"
                    aria-label="Search nodes" autocomplete="off" />
                <button id="nodeSearchPrevBtn" class="search-step-btn" aria-label="Previous search result">‹</button>
                <button id="nodeSearchNextBtn" class="search-step-btn" aria-label="Next search result">›</button>
                <div class="search-status" id="nodeSearchStatus"></div>
            </div>
        </div>

        <div id="nodeQuickActions" class="node-quick-actions hidden" aria-label="Selected node actions">
            <div class="quick-action-row">
                <button type="button" data-node-action="add-child" title="Add Child" aria-label="Add Child">↳</button>
                <button type="button" data-node-action="add-sibling" title="Add Sibling" aria-label="Add Sibling">⇥</button>
                <button type="button" data-node-action="make-root" title="Make Root" aria-label="Make Root">↑</button>
                <button type="button" class="danger" data-node-action="delete" title="Delete" aria-label="Delete">×</button>
            </div>
            <div class="quick-action-row quick-nav-row" aria-label="Move selection">
                <button type="button" data-node-action="move-left" title="Move Left" aria-label="Move Left">←</button>
                <button type="button" data-node-action="move-up" title="Move Up" aria-label="Move Up">↑</button>
                <button type="button" data-node-action="move-down" title="Move Down" aria-label="Move Down">↓</button>
                <button type="button" data-node-action="move-right" title="Move Right" aria-label="Move Right">→</button>
            </div>
        </div>

        <div id="viewport">
            <div id="scene">
                <svg id="edges"></svg>
                <div id="nodesLayer"></div>
            </div>
        </div>

        <div class="modal-backdrop" id="editorBackdrop">
            <form class="modal" id="editorForm">
                <h3>Edit Node</h3>
                <label for="titleInput">Title</label>
                <input id="titleInput" type="text" maxlength="120" enterkeyhint="done" autocomplete="off" />
                <div class="impact-panel" id="parentImpactPanel" hidden>
                    <label>Parent impact</label>
                    <div class="impact-toggle" role="group" aria-label="Parent impact">
                        <button type="button" class="impact-btn" data-impact="benefit">助益</button>
                        <button type="button" class="impact-btn" data-impact="harm">损害</button>
                    </div>
                </div>
                <div class="row">
                    <button id="plusCountBtn" type="button">+1 count</button>
                    <button id="plusTimeBtn" type="button">+20 minutes</button>
                    <button id="toggleStatsBtn" type="button" aria-expanded="false" aria-controls="editorStats">Stats</button>
                </div>
                <div class="stats" id="editorStats" hidden></div>
                <div class="row">
                    <button id="saveNodeBtn" class="primary" type="submit">Save</button>
                    <button id="cancelNodeBtn" type="button">Close</button>
                </div>
            </form>
        </div>

        <div class="modal-backdrop" id="exportBackdrop">
            <div class="modal">
                <h3>Export / Import JSON</h3>
                <textarea id="importExportArea" spellcheck="false"></textarea>
                <div class="row">
                    <button id="copyJsonBtn" class="primary">Copy JSON</button>
                    <button id="downloadJsonBtn" class="primary">Download JSON File</button>
                    <button id="loadJsonBtn">Load JSON</button>
                    <button id="closeExportBtn">Close</button>
                </div>
            </div>
        </div>

        <div class="modal-backdrop" id="settingsBackdrop">
            <div class="modal">
                <div class="modal-head">
                    <h3>Settings</h3>
                    <button id="closeSettingsBtn" class="modal-close" aria-label="Close settings">×</button>
                </div>
                <div class="settings-panel">
                    <div class="settings-row">
                        <label class="settings-label" for="spaceSelect">Space</label>
                        <select class="space-select" id="spaceSelect" aria-label="Tree Map Space"></select>
                        <div class="settings-status space-summary" id="spaceStatus"></div>
                        <div class="settings-inline space-action-row">
                            <button id="newLocalSpaceBtn">New Local</button>
                            <button id="newCloudSpaceBtn">New Cloud</button>
                            <button id="renameSpaceBtn">Rename</button>
                            <button id="refreshCloudSpacesBtn">Refresh Cloud</button>
                            <button id="deleteSpaceBtn" class="danger">Delete Space</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-label">Migrate</div>
                        <div class="settings-grid">
                            <select class="space-select" id="migrationSourceSelect"
                                aria-label="Migration source"></select>
                            <select class="space-select" id="migrationTargetSelect"
                                aria-label="Migration target"></select>
                        </div>
                        <div class="settings-inline">
                            <button id="migrateSpaceBtn">Migrate</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-label">Import / Export</div>
                        <div class="settings-inline">
                            <button id="exportBtn">Export JSON</button>
                            <label class="file-label">Import JSON<input id="importInput" type="file"
                                    accept="application/json" /></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-backdrop" id="spaceNameBackdrop">
            <div class="modal">
                <h3 id="spaceNameTitle">New Space</h3>
                <label for="spaceNameInput">Name</label>
                <input id="spaceNameInput" type="text" maxlength="80" />
                <div class="stats" id="spaceNameMessage"></div>
                <div class="row">
                    <button id="spaceNameSaveBtn" class="primary">Create</button>
                    <button id="spaceNameCancelBtn">Close</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/tree-map.js"></script>
</body>

</html>
